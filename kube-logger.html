<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IO Log Viewer</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #6e7681;
    --text-bright: #f0f6fc;
    --accent: #58a6ff;
    --error: #f85149;
    --warn: #d29922;
    --info: #58a6ff;
    --debug: #8b949e;
    --trace: #484f58;
    --success: #3fb950;
    --http-500: #f85149;
    --http-400: #d29922;
    --http-300: #58a6ff;
    --http-200: #3fb950;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-bright);
    white-space: nowrap;
  }

  .stats {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .stat .dot.error { background: var(--error); }
  .stat .dot.warn { background: var(--warn); }
  .stat .dot.info { background: var(--info); }
  .stat .dot.debug { background: var(--debug); }
  .stat .dot.trace { background: var(--trace); }
  .stat .dot.total { background: var(--accent); }
  .stat .dot.http { background: var(--http-500); }

  /* Toolbar */
  .toolbar {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .search-box {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 10px;
    flex: 1;
    min-width: 200px;
    max-width: 400px;
  }

  .search-box:focus-within { border-color: var(--accent); }

  .search-box svg { flex-shrink: 0; color: var(--text-muted); }

  .search-box input {
    background: none;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 8px;
    width: 100%;
    outline: none;
  }

  .search-box input::placeholder { color: var(--text-muted); }

  .search-count {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  select, .btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }

  select:focus, .btn:focus { border-color: var(--accent); }
  select:hover, .btn:hover { background: var(--bg-tertiary); }

  .btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .btn.error-jump {
    background: rgba(248, 81, 73, 0.15);
    border-color: var(--error);
    color: var(--error);
  }

  .btn.error-jump:hover { background: rgba(248, 81, 73, 0.25); }

  .separator {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  /* Error Summary Banner */
  .error-banner {
    background: rgba(248, 81, 73, 0.08);
    border-bottom: 1px solid rgba(248, 81, 73, 0.3);
    padding: 8px 20px;
    font-size: 12px;
    color: var(--error);
    flex-shrink: 0;
    display: none;
    cursor: pointer;
  }

  .error-banner:hover { background: rgba(248, 81, 73, 0.12); }
  .error-banner.visible { display: block; }

  /* Flow Timeline */
  .flow-timeline {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    flex-shrink: 0;
    display: none;
    overflow-x: auto;
  }

  .flow-timeline.visible { display: block; }

  .flow-timeline-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .flow-nodes {
    display: flex;
    align-items: center;
    gap: 0;
    font-size: 11px;
  }

  .flow-node {
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid var(--border);
    background: var(--bg);
  }

  .flow-node:hover { border-color: var(--accent); }
  .flow-node.done { border-color: var(--success); color: var(--success); }
  .flow-node.process { border-color: var(--accent); color: var(--accent); }
  .flow-node.failed { border-color: var(--error); color: var(--error); background: rgba(248,81,73,0.1); }
  .flow-node.active-filter { background: var(--accent); color: var(--bg); }

  .flow-arrow {
    color: var(--text-muted);
    padding: 0 4px;
    font-size: 14px;
  }

  /* Drop zone */
  .drop-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border: 2px dashed var(--border);
    margin: 40px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(88, 166, 255, 0.05);
  }

  .drop-zone svg { color: var(--text-muted); }
  .drop-zone p { color: var(--text-muted); font-size: 14px; }
  .drop-zone .hint { font-size: 12px; color: var(--trace); }

  .drop-zone.hidden { display: none; }

  /* Log container */
  .log-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    display: none;
    font-size: 12px;
    line-height: 1.6;
  }

  .log-container.visible { display: block; }

  .log-line {
    padding: 1px 20px;
    display: flex;
    border-bottom: 1px solid transparent;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .log-line:hover { background: rgba(255,255,255,0.03); }

  .log-line.level-ERROR, .log-line.level-FATAL {
    background: rgba(248, 81, 73, 0.06);
    border-bottom-color: rgba(248, 81, 73, 0.1);
  }

  .log-line.level-WARN {
    background: rgba(210, 153, 34, 0.06);
    border-bottom-color: rgba(210, 153, 34, 0.1);
  }

  .log-line.level-TRACE { opacity: 0.45; }
  .log-line.level-TRACE:hover { opacity: 0.8; }

  .log-line.http-500 {
    background: rgba(248, 81, 73, 0.1);
    border-bottom-color: rgba(248, 81, 73, 0.2);
  }

  .log-line.http-400 {
    background: rgba(210, 153, 34, 0.06);
  }

  .log-line.search-match {
    background: rgba(88, 166, 255, 0.1);
  }

  .log-line.highlight {
    background: rgba(88, 166, 255, 0.15);
    border-left: 3px solid var(--accent);
  }

  .log-line.failure-line {
    background: rgba(248, 81, 73, 0.08);
    border-left: 3px solid var(--error);
  }

  .log-line.hidden { display: none; }

  .line-no {
    color: var(--trace);
    min-width: 48px;
    text-align: right;
    padding-right: 12px;
    user-select: none;
    flex-shrink: 0;
  }

  .line-ts {
    color: var(--text-muted);
    min-width: 100px;
    flex-shrink: 0;
    padding-right: 8px;
  }

  .line-level {
    min-width: 52px;
    flex-shrink: 0;
    padding-right: 8px;
    font-weight: 600;
  }

  .line-level.ERROR, .line-level.FATAL { color: var(--error); }
  .line-level.WARN { color: var(--warn); }
  .line-level.INFO { color: var(--info); }
  .line-level.DEBUG { color: var(--debug); }
  .line-level.TRACE { color: var(--trace); }
  .line-level.HTTP { color: var(--text-muted); }

  .line-pod {
    color: var(--text-muted);
    min-width: 120px;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
    padding-right: 8px;
    cursor: pointer;
  }

  .line-pod:hover { color: var(--accent); }

  .line-reqid {
    color: var(--accent);
    opacity: 0.7;
    cursor: pointer;
    flex-shrink: 0;
    padding-right: 8px;
    min-width: 80px;
    font-size: 11px;
  }

  .line-reqid:hover { opacity: 1; text-decoration: underline; }

  .line-msg {
    flex: 1;
    color: var(--text);
    min-width: 0;
  }

  .line-msg .highlight-text {
    background: rgba(210, 153, 34, 0.4);
    color: var(--text-bright);
    border-radius: 2px;
    padding: 0 2px;
  }

  .line-http-status {
    font-weight: 700;
    padding: 0 4px;
    border-radius: 3px;
  }

  .line-http-status.s5xx { color: var(--http-500); background: rgba(248,81,73,0.15); }
  .line-http-status.s4xx { color: var(--http-400); background: rgba(210,153,34,0.15); }
  .line-http-status.s3xx { color: var(--http-300); }
  .line-http-status.s2xx { color: var(--http-200); }

  /* Trace collapse */
  .trace-collapse-bar {
    padding: 2px 20px;
    font-size: 11px;
    color: var(--trace);
    cursor: pointer;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .trace-collapse-bar:hover { background: var(--bg-secondary); color: var(--text-muted); }

  /* JSON viewer */
  .json-expand {
    cursor: pointer;
    color: var(--accent);
    opacity: 0.6;
    margin-left: 4px;
    font-size: 10px;
  }

  .json-expand:hover { opacity: 1; }

  .json-detail {
    display: none;
    padding: 8px 20px 8px 100px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-muted);
  }

  .json-detail.visible { display: block; }

  .json-detail .json-key { color: var(--accent); }
  .json-detail .json-str { color: var(--success); }
  .json-detail .json-num { color: var(--warn); }
  .json-detail .json-bool { color: #d2a8ff; }
  .json-detail .json-null { color: var(--error); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 12px;
    color: var(--text);
    z-index: 1000;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.visible { opacity: 1; transform: translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border); }

  /* Responsive */
  @media (max-width: 900px) {
    .line-pod { display: none; }
    .line-reqid { display: none; }
    .line-ts { min-width: 70px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>IO Log Viewer</h1>
  <div class="stats" id="stats"></div>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/></svg>
    <input type="text" id="searchInput" placeholder="Search logs... (regex supported)" />
    <span class="search-count" id="searchCount"></span>
  </div>

  <select id="levelFilter">
    <option value="all">All Levels</option>
    <option value="ERROR">ERROR</option>
    <option value="WARN">WARN</option>
    <option value="INFO">INFO</option>
    <option value="DEBUG">DEBUG</option>
    <option value="TRACE">TRACE</option>
    <option value="HTTP">HTTP (nginx)</option>
  </select>

  <select id="podFilter">
    <option value="all">All Services</option>
  </select>

  <select id="reqidFilter">
    <option value="all">All Request IDs</option>
  </select>

  <div class="separator"></div>

  <button class="btn" id="hideTraceBtn" title="Toggle TRACE visibility">Hide TRACE</button>
  <button class="btn error-jump" id="prevError" title="Previous error">&#9650; Error</button>
  <button class="btn error-jump" id="nextError" title="Next error">&#9660; Error</button>

  <div class="separator"></div>

  <button class="btn" id="resetBtn" title="Clear all filters">Reset</button>
  <button class="btn" id="exportBtn" title="Export filtered view">Export Filtered</button>

  <input type="file" id="fileInput" accept=".txt,.log,.json" style="display:none" />
  <button class="btn" id="openFileBtn">Open File</button>
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="flow-timeline" id="flowTimeline">
  <div class="flow-timeline-label">Flow Node Execution</div>
  <div class="flow-nodes" id="flowNodes"></div>
</div>

<div class="drop-zone" id="dropZone">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
  </svg>
  <p>Drop your log file here or click to open</p>
  <p class="hint">Supports stern/kubelog output, JSON structured logs, nginx access logs</p>
  <p class="hint" style="margin-top:8px; color: var(--accent);">Tip: <code>ow_logs -r io > logs.txt</code> or <code>ow_logs -r io | tee logs.txt</code></p>
</div>

<div class="log-container" id="logContainer"></div>

<div class="toast" id="toast"></div>

<script>
const state = {
  lines: [],         // parsed log lines
  rawLines: [],      // raw text lines
  filtered: [],      // indices of visible lines
  errorIndices: [],  // indices of error/failure lines
  currentError: -1,
  pods: new Set(),
  reqIds: new Map(),  // reqId -> count
  flowNodes: [],
  searchTerm: '',
  hideTrace: false,
  levelFilter: 'all',
  podFilter: 'all',
  reqidFilter: 'all',
};

// ---- Parsing ----

const NGINX_RE = /^(\S+)\s+(\S+)\s+(\S+)\s+-\s+-\s+\[([^\]]+)\]\s+"(\w+)\s+(\S+)\s+\S+"\s+(\d+)\s+(\d+)\s+"([^"]*)"\s+"([^"]*)"/;
const STERN_JSON_RE = /^(\S+)\s+(\S+)\s+(\{.+\})$/;
const STERN_PREFIX_RE = /^([+-])\s+(\S+)\s+.\s+(\S+)$/;

function parseLine(raw, idx) {
  const trimmed = raw.trimEnd();
  if (!trimmed) return null;

  // Stern connect/disconnect lines
  const sternMatch = trimmed.match(STERN_PREFIX_RE);
  if (sternMatch) {
    return { type: 'stern', action: sternMatch[1], pod: sternMatch[2], container: sternMatch[3], idx, raw: trimmed };
  }

  // Nginx access log (with stern prefix)
  const parts = trimmed.split(' ');
  // Try to detect nginx: look for HTTP status code pattern
  const nginxMatch = trimmed.match(NGINX_RE);
  if (nginxMatch) {
    const status = parseInt(nginxMatch[7]);
    return {
      type: 'http',
      pod: nginxMatch[1],
      container: nginxMatch[2],
      ip: nginxMatch[3],
      timestamp: nginxMatch[4],
      method: nginxMatch[5],
      path: nginxMatch[6],
      status,
      size: parseInt(nginxMatch[8]),
      referer: nginxMatch[9],
      ua: nginxMatch[10],
      level: 'HTTP',
      idx,
      raw: trimmed,
    };
  }

  // Stern + JSON structured log
  const jsonMatch = trimmed.match(STERN_JSON_RE);
  if (jsonMatch) {
    try {
      const json = JSON.parse(jsonMatch[3]);
      const dataArr = json.data || [];
      let msg = '';
      let fileInfo = null;

      for (const item of dataArr) {
        if (typeof item === 'string') {
          msg += (msg ? ' ' : '') + item;
        } else if (item && item.file) {
          fileInfo = item;
        } else if (item && typeof item === 'object') {
          msg += (msg ? ' ' : '') + JSON.stringify(item);
        }
      }

      return {
        type: 'json',
        pod: jsonMatch[1],
        container: jsonMatch[2],
        timestamp: json.timestamp,
        level: (json.level || 'INFO').toUpperCase(),
        category: json.category,
        reqId: json.req_id,
        domainId: json.domain_id,
        msg,
        fileInfo,
        data: json.data,
        json,
        idx,
        raw: trimmed,
      };
    } catch (e) {
      // JSON parse failed, treat as plain
    }
  }

  // ExperimentalWarning or other non-JSON lines with pod prefix
  const twoPartMatch = trimmed.match(/^(\S+)\s+(\S+)\s+(.+)$/);
  if (twoPartMatch && twoPartMatch[1].startsWith('io-')) {
    return {
      type: 'plain',
      pod: twoPartMatch[1],
      container: twoPartMatch[2],
      msg: twoPartMatch[3],
      level: twoPartMatch[3].toLowerCase().includes('error') ? 'ERROR'
           : twoPartMatch[3].toLowerCase().includes('warn') ? 'WARN' : 'INFO',
      idx,
      raw: trimmed,
    };
  }

  // Fallback: just plain text
  return { type: 'raw', msg: trimmed, level: 'INFO', idx, raw: trimmed };
}

function extractFlowNodes(lines) {
  const nodes = [];
  const seen = new Set();
  const nodeRe = /\[([^\]]+)\]\s+(\S+)\s+-\s+Node\s+(\S+)\s+is\s+in\s+(\w+)\s+state(?:,\s+next\s+node\s+is\s+(\S+))?/;
  const failRe = /Failure from node\s+(\S+)\s+\(([^)]+)\)/;

  for (const line of lines) {
    if (line.type !== 'json') continue;
    const m = (line.msg || '').match(nodeRe);
    if (m) {
      const key = m[3] + '-' + m[4];
      if (!seen.has(key)) {
        seen.add(key);
        nodes.push({ flowId: m[1], flowType: m[2], node: m[3], state: m[4], next: m[5], lineIdx: line.idx });
      }
    }
    const fm = (line.msg || '').match(failRe);
    if (fm) {
      const key = fm[1] + '-failed';
      if (!seen.has(key)) {
        seen.add(key);
        nodes.push({ node: fm[1], label: fm[2], state: 'failed', lineIdx: line.idx });
      }
    }
  }
  return nodes;
}

// ---- Rendering ----

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightSearch(text, term) {
  if (!term) return escapeHtml(text);
  try {
    const re = new RegExp('(' + term + ')', 'gi');
    return escapeHtml(text).replace(new RegExp('(' + escapeHtml(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<span class="highlight-text">$1</span>');
  } catch {
    // If regex is invalid, do literal match
    const escaped = escapeHtml(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escapeHtml(text).replace(new RegExp('(' + escaped + ')', 'gi'), '<span class="highlight-text">$1</span>');
  }
}

function shortPod(pod) {
  if (!pod) return '';
  // io-flow-executor-core-78888cd597-s5hhz -> flow-executor
  const m = pod.match(/^io-(.+?)(?:-[a-f0-9]{6,})+/);
  if (m) return m[1];
  return pod.length > 24 ? pod.slice(0, 22) + '..' : pod;
}

function shortReqId(reqId) {
  if (!reqId) return '';
  return reqId.slice(0, 8);
}

function formatTimestamp(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toISOString().slice(11, 23);
  } catch {
    return ts.slice(0, 12);
  }
}

function renderLine(line, searchTerm) {
  if (line.type === 'stern') return null; // skip connect/disconnect noise

  const el = document.createElement('div');
  el.className = 'log-line';
  el.dataset.idx = line.idx;

  // Add level class
  if (line.level) el.classList.add('level-' + line.level);

  // HTTP status class
  if (line.type === 'http') {
    if (line.status >= 500) el.classList.add('http-500');
    else if (line.status >= 400) el.classList.add('http-400');
  }

  // Failure highlight
  if (line.msg && /failure|fail|error/i.test(line.msg) && line.level !== 'TRACE') {
    el.classList.add('failure-line');
  }

  let html = '';

  // Line number
  html += `<span class="line-no">${line.idx + 1}</span>`;

  // Timestamp
  const ts = line.timestamp ? formatTimestamp(line.timestamp) : '';
  html += `<span class="line-ts">${ts}</span>`;

  // Level
  html += `<span class="line-level ${line.level || ''}">${line.level || ''}</span>`;

  // Pod (shortened)
  const pod = shortPod(line.pod);
  html += `<span class="line-pod" title="${escapeHtml(line.pod || '')}" data-pod="${escapeHtml(line.pod || '')}">${escapeHtml(pod)}</span>`;

  // Request ID
  const reqId = line.reqId || '';
  html += `<span class="line-reqid" title="${escapeHtml(reqId)}" data-reqid="${escapeHtml(reqId)}">${reqId ? shortReqId(reqId) : ''}</span>`;

  // Message
  if (line.type === 'http') {
    const statusClass = line.status >= 500 ? 's5xx' : line.status >= 400 ? 's4xx' : line.status >= 300 ? 's3xx' : 's2xx';
    const msgText = `${line.method} ${line.path} `;
    html += `<span class="line-msg">${highlightSearch(msgText, searchTerm)}<span class="line-http-status ${statusClass}">${line.status}</span> ${line.size}B</span>`;
  } else {
    const msgText = line.msg || line.raw || '';
    const display = msgText.length > 500 ? msgText.slice(0, 500) + '...' : msgText;
    html += `<span class="line-msg">${highlightSearch(display, searchTerm)}`;
    if (line.type === 'json' && line.data) {
      html += `<span class="json-expand" data-line-idx="${line.idx}" title="Expand JSON">[+]</span>`;
    }
    html += `</span>`;
  }

  el.innerHTML = html;
  return el;
}

function renderJsonDetail(line) {
  const el = document.createElement('div');
  el.className = 'json-detail';
  el.id = 'json-detail-' + line.idx;

  function syntaxHighlight(json) {
    const str = JSON.stringify(json, null, 2);
    return str.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
      let cls = 'json-num';
      if (/^"/.test(match)) {
        cls = /:$/.test(match) ? 'json-key' : 'json-str';
      } else if (/true|false/.test(match)) {
        cls = 'json-bool';
      } else if (/null/.test(match)) {
        cls = 'json-null';
      }
      return `<span class="${cls}">${match}</span>`;
    });
  }

  el.innerHTML = syntaxHighlight(line.json || line.data);
  return el;
}

// ---- Filtering ----

function applyFilters() {
  const { lines, searchTerm, hideTrace, levelFilter, podFilter, reqidFilter } = state;
  let searchRe = null;
  if (searchTerm) {
    try { searchRe = new RegExp(searchTerm, 'i'); } catch { searchRe = null; }
  }

  state.filtered = [];
  state.errorIndices = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (!line || line.type === 'stern') continue;

    // Level filter
    if (levelFilter !== 'all' && line.level !== levelFilter) continue;
    if (hideTrace && line.level === 'TRACE') continue;

    // Pod filter
    if (podFilter !== 'all' && line.pod !== podFilter) continue;

    // Request ID filter
    if (reqidFilter !== 'all' && line.reqId !== reqidFilter) continue;

    // Search filter
    if (searchRe) {
      const text = line.raw || line.msg || '';
      if (!searchRe.test(text)) continue;
    }

    state.filtered.push(i);

    // Track errors
    if (line.level === 'ERROR' || line.level === 'FATAL' ||
        (line.type === 'http' && line.status >= 500) ||
        (line.msg && /failure|fail/i.test(line.msg) && line.level !== 'TRACE')) {
      state.errorIndices.push(i);
    }
  }

  state.currentError = -1;
}

function renderAll() {
  const container = document.getElementById('logContainer');
  container.innerHTML = '';

  const fragment = document.createDocumentFragment();
  for (const idx of state.filtered) {
    const el = renderLine(state.lines[idx], state.searchTerm);
    if (el) fragment.appendChild(el);
  }
  container.appendChild(fragment);

  updateStats();
  updateSearchCount();
}

function updateStats() {
  const counts = { total: state.filtered.length, ERROR: 0, WARN: 0, INFO: 0, DEBUG: 0, TRACE: 0, HTTP: 0 };
  for (const idx of state.filtered) {
    const l = state.lines[idx];
    if (l && counts[l.level] !== undefined) counts[l.level]++;
    if (l && l.type === 'http') counts.HTTP++;
  }

  const stats = document.getElementById('stats');
  stats.innerHTML = `
    <span class="stat"><span class="dot total"></span>${counts.total} lines</span>
    ${counts.ERROR ? `<span class="stat"><span class="dot error"></span>${counts.ERROR} errors</span>` : ''}
    ${counts.WARN ? `<span class="stat"><span class="dot warn"></span>${counts.WARN} warnings</span>` : ''}
    <span class="stat"><span class="dot info"></span>${counts.INFO} info</span>
    <span class="stat"><span class="dot debug"></span>${counts.DEBUG} debug</span>
    <span class="stat"><span class="dot trace"></span>${counts.TRACE} trace</span>
    ${counts.HTTP ? `<span class="stat"><span class="dot http"></span>${counts.HTTP} HTTP</span>` : ''}
  `;

  // Error banner
  const banner = document.getElementById('errorBanner');
  if (state.errorIndices.length > 0) {
    const summaries = [];
    for (const idx of state.errorIndices.slice(0, 5)) {
      const l = state.lines[idx];
      if (l.type === 'http') {
        summaries.push(`${l.method} ${l.path} → ${l.status}`);
      } else if (l.msg) {
        summaries.push(l.msg.slice(0, 80));
      }
    }
    banner.textContent = `${state.errorIndices.length} issue(s) found: ${summaries.join(' | ')}`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

function updateSearchCount() {
  const el = document.getElementById('searchCount');
  if (state.searchTerm) {
    el.textContent = `${state.filtered.length} matches`;
  } else {
    el.textContent = '';
  }
}

// ---- Flow Timeline ----

function renderFlowTimeline() {
  const container = document.getElementById('flowNodes');
  const wrapper = document.getElementById('flowTimeline');
  container.innerHTML = '';

  if (state.flowNodes.length === 0) {
    wrapper.classList.remove('visible');
    return;
  }

  wrapper.classList.add('visible');

  state.flowNodes.forEach((node, i) => {
    if (i > 0) {
      const arrow = document.createElement('span');
      arrow.className = 'flow-arrow';
      arrow.textContent = '→';
      container.appendChild(arrow);
    }

    const el = document.createElement('span');
    el.className = `flow-node ${node.state}`;
    el.textContent = node.label || node.node;
    el.title = `Node: ${node.node}, State: ${node.state}`;
    el.dataset.lineIdx = node.lineIdx;
    el.addEventListener('click', () => {
      scrollToLine(node.lineIdx);
    });
    container.appendChild(el);
  });
}

// ---- Populate filters ----

function populateFilters() {
  const podSelect = document.getElementById('podFilter');
  const reqSelect = document.getElementById('reqidFilter');

  // Pods
  const pods = [...state.pods].sort();
  podSelect.innerHTML = '<option value="all">All Services</option>';
  for (const pod of pods) {
    const opt = document.createElement('option');
    opt.value = pod;
    opt.textContent = shortPod(pod);
    podSelect.appendChild(opt);
  }

  // Request IDs
  const reqIds = [...state.reqIds.entries()].sort((a, b) => b[1] - a[1]);
  reqSelect.innerHTML = '<option value="all">All Request IDs</option>';
  for (const [id, count] of reqIds) {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = `${shortReqId(id)} (${count} lines)`;
    reqSelect.appendChild(opt);
  }
}

// ---- Navigation ----

function scrollToLine(idx) {
  const container = document.getElementById('logContainer');
  const el = container.querySelector(`[data-idx="${idx}"]`);
  if (el) {
    // Remove previous highlights
    container.querySelectorAll('.highlight').forEach(e => e.classList.remove('highlight'));
    el.classList.add('highlight');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function jumpToError(direction) {
  if (state.errorIndices.length === 0) {
    toast('No errors found');
    return;
  }

  if (direction === 'next') {
    state.currentError = (state.currentError + 1) % state.errorIndices.length;
  } else {
    state.currentError = state.currentError <= 0 ? state.errorIndices.length - 1 : state.currentError - 1;
  }

  scrollToLine(state.errorIndices[state.currentError]);
  toast(`Error ${state.currentError + 1} of ${state.errorIndices.length}`);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('visible'), 2000);
}

// ---- File Loading ----

function loadText(text) {
  const rawLines = text.split('\n');
  state.rawLines = rawLines;
  state.lines = [];
  state.pods = new Set();
  state.reqIds = new Map();

  for (let i = 0; i < rawLines.length; i++) {
    const parsed = parseLine(rawLines[i], i);
    state.lines.push(parsed);

    if (parsed) {
      if (parsed.pod) state.pods.add(parsed.pod);
      if (parsed.reqId) {
        state.reqIds.set(parsed.reqId, (state.reqIds.get(parsed.reqId) || 0) + 1);
      }
    }
  }

  state.flowNodes = extractFlowNodes(state.lines.filter(Boolean));

  // Show UI
  document.getElementById('dropZone').classList.add('hidden');
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('logContainer').classList.add('visible');

  populateFilters();
  renderFlowTimeline();
  applyFilters();
  renderAll();

  // Auto-jump to first error if any
  if (state.errorIndices.length > 0) {
    setTimeout(() => {
      state.currentError = 0;
      scrollToLine(state.errorIndices[0]);
    }, 300);
  }

  toast(`Loaded ${rawLines.length} lines`);
}

// ---- Event Listeners ----

// Drop zone
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => loadText(ev.target.result);
    reader.readAsText(file);
  }
});
dropZone.addEventListener('click', () => document.getElementById('fileInput').click());

// File input
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => loadText(ev.target.result);
    reader.readAsText(file);
  }
});

document.getElementById('openFileBtn').addEventListener('click', () => document.getElementById('fileInput').click());

// Search
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    state.searchTerm = e.target.value.trim();
    applyFilters();
    renderAll();
  }, 200);
});

// Level filter
document.getElementById('levelFilter').addEventListener('change', (e) => {
  state.levelFilter = e.target.value;
  applyFilters();
  renderAll();
});

// Pod filter
document.getElementById('podFilter').addEventListener('change', (e) => {
  state.podFilter = e.target.value;
  applyFilters();
  renderAll();
});

// Request ID filter
document.getElementById('reqidFilter').addEventListener('change', (e) => {
  state.reqidFilter = e.target.value;
  applyFilters();
  renderAll();
});

// Hide trace
document.getElementById('hideTraceBtn').addEventListener('click', (e) => {
  state.hideTrace = !state.hideTrace;
  e.target.classList.toggle('active', state.hideTrace);
  e.target.textContent = state.hideTrace ? 'Show TRACE' : 'Hide TRACE';
  applyFilters();
  renderAll();
});

// Error navigation
document.getElementById('prevError').addEventListener('click', () => jumpToError('prev'));
document.getElementById('nextError').addEventListener('click', () => jumpToError('next'));

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  state.searchTerm = '';
  state.hideTrace = false;
  state.levelFilter = 'all';
  state.podFilter = 'all';
  state.reqidFilter = 'all';
  document.getElementById('searchInput').value = '';
  document.getElementById('levelFilter').value = 'all';
  document.getElementById('podFilter').value = 'all';
  document.getElementById('reqidFilter').value = 'all';
  document.getElementById('hideTraceBtn').classList.remove('active');
  document.getElementById('hideTraceBtn').textContent = 'Hide TRACE';
  applyFilters();
  renderAll();
});

// Export
document.getElementById('exportBtn').addEventListener('click', () => {
  const text = state.filtered.map(i => state.rawLines[i]).join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'filtered-logs.txt';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported filtered logs');
});

// Click handlers for interactive elements
document.getElementById('logContainer').addEventListener('click', (e) => {
  // Click on pod name to filter
  const podEl = e.target.closest('.line-pod');
  if (podEl && podEl.dataset.pod) {
    state.podFilter = podEl.dataset.pod;
    document.getElementById('podFilter').value = podEl.dataset.pod;
    applyFilters();
    renderAll();
    toast(`Filtered to ${shortPod(podEl.dataset.pod)}`);
    return;
  }

  // Click on request ID to filter
  const reqEl = e.target.closest('.line-reqid');
  if (reqEl && reqEl.dataset.reqid) {
    state.reqidFilter = reqEl.dataset.reqid;
    document.getElementById('reqidFilter').value = reqEl.dataset.reqid;
    applyFilters();
    renderAll();
    toast(`Filtered to request ${shortReqId(reqEl.dataset.reqid)}`);
    return;
  }

  // JSON expand
  const jsonExpand = e.target.closest('.json-expand');
  if (jsonExpand) {
    const lineIdx = parseInt(jsonExpand.dataset.lineIdx);
    const existing = document.getElementById('json-detail-' + lineIdx);
    if (existing) {
      existing.classList.toggle('visible');
      jsonExpand.textContent = existing.classList.contains('visible') ? '[-]' : '[+]';
    } else {
      const line = state.lines[lineIdx];
      if (line) {
        const detail = renderJsonDetail(line);
        detail.classList.add('visible');
        const logLine = jsonExpand.closest('.log-line');
        logLine.after(detail);
        jsonExpand.textContent = '[-]';
      }
    }
    return;
  }
});

// Error banner click
document.getElementById('errorBanner').addEventListener('click', () => {
  jumpToError('next');
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Ctrl/Cmd + F -> focus search
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  // Escape -> clear search
  if (e.key === 'Escape') {
    document.getElementById('searchInput').blur();
    if (state.searchTerm) {
      state.searchTerm = '';
      document.getElementById('searchInput').value = '';
      applyFilters();
      renderAll();
    }
  }
  // Ctrl/Cmd + E -> next error
  if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
    e.preventDefault();
    jumpToError(e.shiftKey ? 'prev' : 'next');
  }
});

// Paste support
document.addEventListener('paste', (e) => {
  if (e.target.tagName === 'INPUT') return;
  const text = e.clipboardData.getData('text');
  if (text && text.length > 50) {
    e.preventDefault();
    loadText(text);
  }
});
</script>
</body>
</html>
