<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kube Logger</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
    --text: #c9d1d9; --muted: #6e7681; --bright: #f0f6fc;
    --accent: #58a6ff; --error: #f85149; --warn: #d29922;
    --info: #58a6ff; --debug: #8b949e; --trace: #484f58;
    --success: #3fb950;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'SF Mono','Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* ── Top bar ── */
  .bar { background:var(--bg2); border-bottom:1px solid var(--border); padding:8px 20px; display:flex; align-items:center; gap:10px; flex-shrink:0; flex-wrap:wrap; }
  .bar h1 { font-size:13px; font-weight:600; color:var(--bright); white-space:nowrap; }
  .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dot.ok { background:var(--success); } .dot.fail { background:var(--error); } .dot.pending { background:var(--warn); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  @keyframes rec { 0%,100%{opacity:1}50%{opacity:.5} }

  .status-text { font-size:11px; color:var(--muted); }
  .stats { display:flex; gap:10px; font-size:11px; color:var(--muted); margin-left:auto; }
  .stats .s { display:flex; align-items:center; gap:3px; }
  .stats .s .d { width:7px; height:7px; border-radius:50%; }
  .stats .s .d.er { background:var(--error); } .stats .s .d.wr { background:var(--warn); } .stats .s .d.db { background:var(--debug); } .stats .s .d.tr { background:var(--trace); } .stats .s .d.ht { background:var(--error); } .stats .s .d.to { background:var(--accent); }

  /* Namespace legend */
  .ns-legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .ns-chip { display:inline-flex; align-items:center; gap:5px; padding:2px 7px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; font-size:10px; color:var(--text); }
  .ns-chip:hover { border-color:var(--accent); }
  .ns-chip .ns-ct { color:var(--muted); font-size:9px; }
  .ns-chip input[type=color] {
    width:16px; height:14px; padding:0;
    border:1px solid var(--border); border-radius:3px;
    background:transparent; cursor:pointer; flex-shrink:0;
  }
  .ns-chip input[type=color]::-webkit-color-swatch-wrapper { padding:0; }
  .ns-chip input[type=color]::-webkit-color-swatch { border:none; border-radius:2px; }

  /* Per-line namespace indicator:
     - full-row background tint applied via background-image (gradient) so it
       stacks ON TOP of any level-specific background-color (ERROR red etc.)
       while leaving text fully readable
     - 3px solid left stripe for a hard visual anchor */
  .ll {
    position:relative;
    background-image: linear-gradient(var(--ns-bg,transparent), var(--ns-bg,transparent));
  }
  .ll .ll-ns-stripe {
    position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--ns-color,transparent);
    pointer-events:none;
  }

  /* ── Controls ── */
  select,.btn,input[type=text] { background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:12px; padding:5px 10px; border-radius:5px; cursor:pointer; outline:none; }
  select:focus,.btn:focus,input[type=text]:focus { border-color:var(--accent); }
  select:hover,.btn:hover { background:var(--bg3); }
  .btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); }
  .btn.primary { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:600; }
  .btn.danger { background:rgba(248,81,73,.15); border-color:var(--error); color:var(--error); font-weight:600; }
  .btn.recording { background:var(--error); color:white; border-color:var(--error); animation:rec 1.5s infinite; }
  .btn.ej { background:rgba(248,81,73,.12); border-color:var(--error); color:var(--error); }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  .sep { width:1px; height:22px; background:var(--border); flex-shrink:0; }

  .search-box { display:flex; align-items:center; background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:0 8px; flex:1; min-width:180px; max-width:360px; }
  .search-box:focus-within { border-color:var(--accent); }
  .search-box svg { flex-shrink:0; color:var(--muted); }
  .search-box input { background:none; border:none; color:var(--text); font-family:inherit; font-size:12px; padding:5px 6px; width:100%; outline:none; }
  .search-box input::placeholder { color:var(--muted); }
  .sc { font-size:10px; color:var(--muted); white-space:nowrap; }

  /* ── Banners ── */
  .rec-banner { background:rgba(248,81,73,.06); border-bottom:1px solid rgba(248,81,73,.25); padding:5px 20px; font-size:11px; color:var(--error); display:none; align-items:center; gap:6px; flex-shrink:0; }
  .rec-banner.v { display:flex; }
  .rec-dot { width:9px; height:9px; border-radius:50%; background:var(--error); animation:rec 1s infinite; flex-shrink:0; }
  .err-banner { background:rgba(248,81,73,.06); border-bottom:1px solid rgba(248,81,73,.25); padding:6px 20px; font-size:11px; color:var(--error); display:none; cursor:pointer; flex-shrink:0; }
  .err-banner.v { display:block; }
  .err-banner:hover { background:rgba(248,81,73,.1); }

  /* ── Flow timeline ── */
  .ftl { background:var(--bg2); border-bottom:1px solid var(--border); padding:8px 20px; flex-shrink:0; display:none; overflow-x:auto; }
  .ftl.v { display:block; }
  .ftl-label { font-size:10px; color:var(--muted); margin-bottom:4px; }
  .fnodes { display:flex; align-items:center; font-size:11px; }
  .fnode { padding:3px 8px; border-radius:4px; cursor:pointer; white-space:nowrap; border:1px solid var(--border); background:var(--bg); margin:0 1px; }
  .fnode:hover { border-color:var(--accent); background:var(--bg3); }
  .fnode.done { border-color:var(--success); color:var(--success); }
  .fnode.post { border-color:var(--success); color:var(--success); }
  .fnode.process { border-color:var(--accent); color:var(--accent); }
  .fnode.pre { border-color:var(--warn); color:var(--warn); }
  .fnode.failed { border-color:var(--error); color:var(--error); background:rgba(248,81,73,.08); }
  .farrow { color:var(--muted); padding:0 2px; font-size:12px; }
  .farrow.fsep { color:var(--border); font-weight:700; padding:0 6px; }
  .fflow-label { font-size:10px; color:var(--accent); background:rgba(88,166,255,.1); padding:2px 6px; border-radius:3px; margin-right:4px; white-space:nowrap; cursor:pointer; display:inline-flex; align-items:center; gap:4px; }
  .fflow-label:hover { background:rgba(88,166,255,.2); }
  .fflow-hide { opacity:0; font-size:13px; color:var(--muted); cursor:pointer; transition:opacity .15s; } .fflow-label:hover .fflow-hide { opacity:.6; } .fflow-hide:hover { opacity:1!important; color:var(--error); }
  .fhidden-badge { font-size:10px; color:var(--muted); background:var(--bg3); padding:2px 8px; border-radius:3px; cursor:pointer; border:1px solid var(--border); } .fhidden-badge:hover { border-color:var(--accent); color:var(--accent); }
  .hp-section-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; padding:8px 14px 4px; }
  .hp-flow-icon { color:var(--accent); flex-shrink:0; font-size:8px; }
  .hp-exec-id { font-size:10px; color:var(--muted); }

  /* Node popover */
  .node-pop { position:fixed; z-index:200; background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:10px 14px; min-width:240px; max-width:380px; box-shadow:0 4px 16px rgba(0,0,0,.5); font-size:12px; }
  .np-row { display:flex; justify-content:space-between; padding:3px 0; gap:12px; }
  .np-label { color:var(--muted); flex-shrink:0; }
  .np-val { color:var(--text); text-align:right; word-break:break-all; }
  .np-val em { color:var(--accent); font-style:normal; }
  .np-state-done { color:var(--success); } .np-state-process { color:var(--accent); } .np-state-pre { color:var(--warn); } .np-state-failed { color:var(--error); }
  .np-fail { color:var(--error); font-weight:600; }
  .np-link { color:var(--accent); cursor:pointer; } .np-link:hover { text-decoration:underline; }
  .np-actions { display:flex; gap:6px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
  .np-btn { padding:4px 10px; background:var(--bg3); border:1px solid var(--border); border-radius:4px; cursor:pointer; color:var(--text); font-size:11px; }
  .np-btn:hover { border-color:var(--accent); color:var(--accent); }
  .np-divider { border-top:1px solid var(--border); margin:8px 0; }
  .np-section-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .np-path { display:flex; flex-wrap:wrap; align-items:center; gap:1px; margin-bottom:4px; }
  .np-path-node { padding:2px 6px; border-radius:3px; font-size:10px; background:var(--bg); border:1px solid var(--border); color:var(--text); white-space:nowrap; }
  .np-path-node.np-done { border-color:var(--success); color:var(--success); }
  .np-path-node.np-nested { border-color:var(--accent); color:var(--accent); }
  .np-path-node.np-path-fail { border-color:var(--error); color:var(--error); background:rgba(248,81,73,.1); font-weight:600; }
  .np-path-arrow { color:var(--muted); font-size:10px; padding:0 1px; }

  /* Failure tag in log lines */
  .lfail { cursor:pointer; display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:4px; border:1px solid var(--error); background:rgba(248,81,73,.1); color:var(--error); }
  .lfail:hover { background:rgba(248,81,73,.2); }
  .lfail-id { font-size:10px; opacity:.6; }
  .lfail-hint { font-size:9px; opacity:.4; font-weight:400; }

  /* ── Welcome ── */
  .welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:40px; }
  .welcome.h { display:none; }
  .welcome h2 { font-size:16px; color:var(--bright); }
  .welcome p { font-size:12px; color:var(--muted); text-align:center; max-width:460px; line-height:1.7; }
  .dz { border:2px dashed var(--border); border-radius:8px; padding:14px 20px; cursor:pointer; font-size:12px; color:var(--muted); text-align:center; transition:all .2s; }
  .dz:hover,.dz.over { border-color:var(--accent); background:rgba(88,166,255,.04); }

  /* ── Log container ── */
  .lc { flex:1; overflow-y:auto; overflow-x:hidden; display:none; font-size:12px; line-height:1.6; }
  .lc.v { display:block; }

  /* NOTE: use background-color (not `background:` shorthand) everywhere so we don't
     wipe out the ns tint gradient (.ll { background-image: ... }) that layers on top. */
  .ll { padding:1px 20px; display:flex; border-bottom:1px solid transparent; white-space:pre-wrap; word-break:break-all; }
  .ll:hover { background-color:rgba(255,255,255,.03); }
  .ll.lERROR,.ll.lFATAL { background-color:rgba(248,81,73,.06); border-bottom-color:rgba(248,81,73,.1); }
  .ll.lWARN { background-color:rgba(210,153,34,.06); }
  .ll.lTRACE { opacity:.45; } .ll.lTRACE:hover { opacity:.8; }
  .ll.h5 { background-color:rgba(248,81,73,.1); border-bottom-color:rgba(248,81,73,.2); }
  .ll.h4 { background-color:rgba(210,153,34,.06); }
  .ll.fl { background-color:rgba(248,81,73,.08); border-left:3px solid var(--error); }
  .ll.lplain { border-left:3px solid var(--warn); background-color:rgba(210,153,34,.04); }
  .ll.lmulti { border-top:none; border-left-color:var(--border); background-color:rgba(210,153,34,.02); }
  .ll.lmulti .lp { color:var(--border); font-size:14px; }
  .ll.lscript-err { border-left:3px solid var(--error); background-color:rgba(248,81,73,.08); }
  .ll.lerror-detail { border-left:3px solid var(--error); background-color:rgba(248,81,73,.12); font-weight:600; }
  .ll.hl { background-color:rgba(88,166,255,.15); border-left:3px solid var(--accent); }
  .lh { opacity:0; color:var(--muted); cursor:pointer; padding:0 6px; flex-shrink:0; font-size:14px; transition:opacity .15s; }
  .ll:hover .lh { opacity:.4; } .lh:hover { opacity:1!important; color:var(--error); }

  /* Hidden patterns panel */
  .hidden-panel { position:fixed; z-index:200; background:var(--bg2); border:1px solid var(--border); border-radius:8px; min-width:300px; max-width:500px; max-height:400px; box-shadow:0 4px 16px rgba(0,0,0,.5); font-size:12px; display:flex; flex-direction:column; }
  .hp-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; font-weight:600; color:var(--bright); }
  .hp-clear { font-weight:400; color:var(--error); cursor:pointer; font-size:11px; } .hp-clear:hover { text-decoration:underline; }
  .hp-list { overflow-y:auto; max-height:320px; }
  .hp-item { display:flex; align-items:center; padding:6px 14px; border-bottom:1px solid var(--border); gap:8px; }
  .hp-item:hover { background:rgba(255,255,255,.03); }
  .hp-pattern { flex:1; color:var(--text); word-break:break-all; min-width:0; }
  .hp-remove { color:var(--muted); cursor:pointer; font-size:16px; padding:0 4px; flex-shrink:0; } .hp-remove:hover { color:var(--error); }
  .hp-empty { padding:16px; color:var(--muted); text-align:center; }

  .ln { color:var(--trace); min-width:48px; text-align:right; padding-right:10px; user-select:none; flex-shrink:0; cursor:pointer; }
  .ln:hover { color:var(--accent); text-decoration:underline; }
  .lt { color:var(--muted); min-width:95px; flex-shrink:0; padding-right:6px; }
  .lv { min-width:50px; flex-shrink:0; padding-right:6px; font-weight:600; }
  .lv.ERROR,.lv.FATAL { color:var(--error); } .lv.WARN { color:var(--warn); } .lv.INFO { color:var(--info); }
  .lv.DEBUG { color:var(--debug); } .lv.TRACE { color:var(--trace); } .lv.HTTP { color:var(--muted); }
  .lp { color:var(--muted); min-width:110px; max-width:200px; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; padding-right:6px; cursor:pointer; }
  .lp:hover { color:var(--accent); }
  .lr { color:var(--accent); opacity:.65; cursor:pointer; flex-shrink:0; padding-right:6px; min-width:72px; font-size:11px; }
  .lr:hover { opacity:1; text-decoration:underline; }
  .lm { flex:1; min-width:0; }
  .lm .hi { background:rgba(210,153,34,.4); color:var(--bright); border-radius:2px; padding:0 2px; }
  .lm .hi0 { background:rgba(230,219,116,.35); color:#e6db74; } .lm .hi1 { background:rgba(166,226,46,.25); color:#a6e22e; }
  .lm .hi2 { background:rgba(102,217,239,.25); color:#66d9ef; } .lm .hi3 { background:rgba(253,151,31,.3); color:#fd971f; }
  .lm .hi4 { background:rgba(174,129,255,.3); color:#ae81ff; } .lm .hi5 { background:rgba(249,38,114,.25); color:#f92672; }
  .lm .hi6 { background:rgba(230,219,116,.35); color:#e6db74; } .lm .hi7 { background:rgba(161,239,228,.25); color:#a1efe4; }
  .hi-add { display:flex; gap:6px; padding:8px 14px; border-bottom:1px solid var(--border); }
  .hi-add input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:12px; padding:5px 8px; border-radius:4px; outline:none; }
  .hi-add input:focus { border-color:var(--accent); }
  .hi-swatch { width:12px; height:12px; border-radius:2px; flex-shrink:0; }
  .hs { font-weight:700; padding:0 3px; border-radius:3px; }
  .hs.s5 { color:var(--error); background:rgba(248,81,73,.15); }
  .hs.s4 { color:var(--warn); background:rgba(210,153,34,.15); }
  .hs.s3 { color:var(--accent); } .hs.s2 { color:var(--success); }

  .je { cursor:pointer; color:var(--accent); opacity:.5; margin-left:4px; font-size:10px; } .je:hover { opacity:1; }
  .jd { display:none; padding:6px 20px 6px 95px; background:var(--bg2); border-bottom:1px solid var(--border); font-size:11px; white-space:pre-wrap; word-break:break-all; color:var(--muted); }
  .jd.v { display:block; }
  .jd .jk { color:var(--accent); } .jd .js { color:var(--success); } .jd .jn { color:var(--warn); } .jd .jb { color:#d2a8ff; } .jd .jl { color:var(--error); }

  .toast { position:fixed; bottom:16px; right:16px; background:var(--bg3); border:1px solid var(--border); padding:8px 14px; border-radius:6px; font-size:12px; z-index:999; opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none; }
  .toast.v { opacity:1; transform:translateY(0); }

  /* ── Trace panel ── */
  .trace-panel { position:fixed; right:0; top:0; width:480px; height:100vh; background:var(--bg2); border-left:2px solid var(--accent); z-index:100; display:none; flex-direction:column; box-shadow:-4px 0 20px rgba(0,0,0,.5); }
  .trace-panel.v { display:flex; }
  .tp-header { padding:10px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .tp-title { font-size:13px; font-weight:600; color:var(--bright); }
  .tp-body { flex:1; overflow-y:auto; padding:12px 0; }

  .tp-section { padding:0 16px 12px; border-bottom:1px solid var(--border); margin-bottom:10px; }
  .tp-section-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }

  .tp-flow-name { font-size:14px; font-weight:700; color:var(--bright); margin-bottom:8px; }
  .tp-flow-name .tp-exec-id { font-size:10px; font-weight:400; color:var(--muted); margin-left:6px; }

  .tp-path { display:flex; flex-wrap:wrap; align-items:center; gap:2px; margin-bottom:4px; }
  .tp-node { padding:3px 8px; border-radius:4px; font-size:11px; border:1px solid var(--border); background:var(--bg); cursor:pointer; white-space:nowrap; }
  .tp-node:hover { border-color:var(--accent); }
  .tp-node.done,.tp-node.post { border-color:var(--success); color:var(--success); }
  .tp-node.process { border-color:var(--accent); color:var(--accent); }
  .tp-node.pre { border-color:var(--warn); color:var(--warn); }
  .tp-node.failed { border-color:var(--error); color:var(--error); background:rgba(248,81,73,.1); }
  .tp-node.active { background:rgba(88,166,255,.15); }
  .tp-arrow { color:var(--muted); font-size:11px; }

  .tp-http { padding:6px 10px; border-radius:4px; font-size:11px; margin-top:6px; border:1px solid var(--border); background:var(--bg); }
  .tp-http.err { border-color:var(--error); background:rgba(248,81,73,.08); }
  .tp-http .tp-method { font-weight:600; }
  .tp-http .tp-status { font-weight:700; padding:0 4px; border-radius:3px; }
  .tp-http .tp-status.s5 { color:var(--error); }
  .tp-http .tp-status.s4 { color:var(--warn); }
  .tp-http .tp-status.s2 { color:var(--success); }

  .tp-line { padding:3px 16px; font-size:11px; line-height:1.5; cursor:pointer; display:flex; gap:6px; }
  .tp-line:hover { background:rgba(255,255,255,.03); }
  .tp-line.err { background:rgba(248,81,73,.06); }
  .tp-line .tp-ts { color:var(--muted); min-width:85px; flex-shrink:0; }
  .tp-line .tp-lv { min-width:42px; flex-shrink:0; font-weight:600; }
  .tp-line .tp-lv.ERROR { color:var(--error); } .tp-line .tp-lv.WARN { color:var(--warn); } .tp-line .tp-lv.DEBUG { color:var(--debug); } .tp-line .tp-lv.INFO { color:var(--info); } .tp-line .tp-lv.TRACE { color:var(--trace); }
  .tp-line .tp-msg { flex:1; min-width:0; word-break:break-all; }
  .tp-line .tp-flow-tag { font-size:9px; color:var(--accent); background:rgba(88,166,255,.1); padding:1px 5px; border-radius:3px; flex-shrink:0; }

  .tp-errors { background:rgba(248,81,73,.06); }
  .tp-failure { padding:6px 0; font-size:12px; color:var(--error); cursor:pointer; display:flex; align-items:baseline; gap:6px; }
  .tp-failure:hover { text-decoration:underline; }
  .tp-fail-icon { flex-shrink:0; }
  .tp-fail-id { color:var(--muted); font-size:10px; }
  .tp-error-detail { padding:4px 0; font-size:11px; color:var(--error); opacity:.85; cursor:pointer; }
  .tp-error-detail:hover { opacity:1; }
  .tp-inline-fail { padding:4px 0 4px 12px; font-size:11px; color:var(--error); border-left:2px solid var(--error); margin:4px 0; cursor:pointer; }
  .tp-inline-fail:hover { background:rgba(248,81,73,.08); }
  .tp-next-id { font-size:9px; color:var(--muted); opacity:.6; }
  .tp-flow-tag.fail { background:rgba(248,81,73,.15); color:var(--error); }
  .tp-empty { color:var(--muted); font-size:12px; text-align:center; padding:20px; }

  /* ── JSON Inspector ── */
  .jin { cursor:pointer; color:var(--accent); opacity:.55; margin-left:6px; font-size:10px; font-family:inherit; padding:0 4px; border-radius:3px; border:1px solid var(--border); background:var(--bg); }
  .jin:hover { opacity:1; background:var(--bg3); border-color:var(--accent); }
  .inspect-panel { position:fixed; left:0; top:0; width:540px; height:100vh; background:var(--bg2); border-right:2px solid var(--accent); z-index:100; display:none; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,.5); }
  .inspect-panel.v { display:flex; }
  .ip-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:6px; }
  .ip-title { font-size:13px; font-weight:600; color:var(--bright); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ip-actions { display:flex; gap:4px; flex-shrink:0; }
  .ip-actions .btn { padding:3px 8px; font-size:11px; }
  .ip-body { flex:1; overflow:auto; padding:12px 14px; font-size:12px; line-height:1.55; font-family:'SF Mono','Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace; }

  .jv-row { white-space:pre-wrap; word-break:break-word; }
  .jv-body { border-left:1px dashed var(--border); margin-left:5px; padding-left:11px; }
  .jv-body.jv-collapsed { display:none; }
  .jv-close.jv-collapsed { display:none; }
  .jv-tog { display:inline-block; width:12px; text-align:center; cursor:pointer; color:var(--muted); user-select:none; margin-right:3px; font-size:9px; }
  .jv-tog:hover { color:var(--accent); }
  .jv-k { color:var(--accent); }
  .jv-str { color:var(--success); }
  .jv-num { color:var(--warn); }
  .jv-bool { color:#d2a8ff; }
  .jv-null { color:var(--error); }
  .jv-br { color:var(--muted); }
  .jv-count { color:var(--trace); font-size:10px; margin-left:6px; }
  .jv-hint { color:var(--trace); font-size:10px; font-style:italic; margin:0 4px; }
  .jv-more { color:var(--accent); cursor:pointer; font-size:10px; opacity:.7; margin-left:4px; }
  .jv-more:hover { opacity:1; text-decoration:underline; }
  .jv-hide { display:none; }
  .jv-preview { color:var(--muted); font-size:10px; margin-left:6px; font-style:italic; }
  .jv-body.jv-collapsed + .jv-close { display:none; }
  .jv-row:hover { background:rgba(255,255,255,.02); }

  ::-webkit-scrollbar { width:7px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:4px; } ::-webkit-scrollbar-thumb:hover { background:var(--border); }
  @media(max-width:800px) { .lp,.lr { display:none; } }
</style>
</head>
<body>

<!-- Top bar -->
<div class="bar">
  <span class="dot" id="cDot"></span>
  <h1>Kube Logger</h1>
  <span class="status-text" id="cLabel">Connecting...</span>
  <button class="btn" id="clearBtn" style="display:none">Clear</button>
  <span id="buildTag" style="font-size:9px;color:var(--muted);opacity:0.6;letter-spacing:0.5px">build:ns-color-v1</span>
  <div class="ns-legend" id="nsLegend"></div>
  <div class="stats" id="stats"></div>
</div>

<!-- Filter bar -->
<div class="bar" id="filterBar" style="display:none">
  <select id="presetSelect" title="Active filter preset"><option value="">— Preset —</option></select>
  <button class="btn" id="presetSave" title="Save current filters as a named preset">Save as…</button>
  <button class="btn" id="presetDel" title="Delete the selected preset" disabled>×</button>
  <div class="sep"></div>
  <div class="search-box">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/></svg>
    <input type="text" id="searchInput" placeholder="Search (regex)" />
    <span class="sc" id="searchCount"></span>
  </div>
  <select id="levelFilter"><option value="all">All Levels</option><option value="ERROR">ERROR</option><option value="WARN">WARN</option><option value="INFO">INFO</option><option value="DEBUG">DEBUG</option><option value="TRACE">TRACE</option><option value="HTTP">HTTP</option></select>
  <select id="podFilter"><option value="all">All Services</option></select>
  <select id="reqidFilter"><option value="all">All Requests</option></select>
  <div class="sep"></div>
  <button class="btn" id="highlightBtn">Highlights</button>
  <button class="btn" id="hiddenBtn">Hidden</button>
  <button class="btn" id="hideTrace">Hide TRACE</button>
  <button class="btn ej" id="prevErr">&#9650; Err</button>
  <button class="btn ej" id="nextErr">&#9660; Err</button>
  <div class="sep"></div>
  <button class="btn" id="autoScroll">Auto-scroll: ON</button>
  <button class="btn" id="resetBtn">Reset</button>
  <button class="btn" id="exportBtn">Export</button>
  <input type="file" id="fileInput" accept=".txt,.log" style="display:none" />
  <button class="btn" id="openFile">Open File</button>
</div>

<div class="rec-banner" id="recBanner"><span class="rec-dot"></span><span id="recInfo"></span></div>
<div class="err-banner" id="errBanner"></div>
<div class="ftl" id="ftl"><div class="ftl-label">Flow Node Execution</div><div class="fnodes" id="fnodes"></div></div>

<!-- Welcome -->
<div class="welcome" id="welcome">
  <h2>Waiting for logs</h2>
  <p>Start a capture from the extension popup, or drop a log file below.</p>
  <div class="dz" id="dz">Drop log file here</div>
</div>

<!-- Logs -->
<div class="lc" id="lc"></div>
<div class="toast" id="toast"></div>

<!-- JSON Inspector Panel -->
<div class="inspect-panel" id="inspectPanel">
  <div class="ip-header">
    <span class="ip-title" id="ipTitle">JSON Inspector</span>
    <div class="ip-actions">
      <button class="btn" id="ipExpand" title="Expand all">Expand</button>
      <button class="btn" id="ipCollapse" title="Collapse all">Collapse</button>
      <button class="btn" id="ipCopy" title="Copy JSON to clipboard">Copy</button>
      <button class="btn" id="ipClose">&times;</button>
    </div>
  </div>
  <div class="ip-body" id="ipBody"></div>
</div>

<!-- Trace Panel -->
<div class="trace-panel" id="tracePanel">
  <div class="tp-header">
    <span class="tp-title" id="tpTitle">Flow Trace</span>
    <button class="btn" id="tpClose">&times;</button>
  </div>
  <div class="tp-body" id="tpBody"></div>
</div>

<script src="viewer.js"></script>
</body>
</html>
