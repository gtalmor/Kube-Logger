<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #6e7681;
    --accent: #58a6ff;
    --error: #f85149;
    --success: #3fb950;
    --warn: #d29922;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
  }

  .header {
    background: var(--bg2);
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header h1 { font-size: 13px; font-weight: 600; color: #f0f6fc; }

  .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .dot.ok { background: var(--success); }
  .dot.fail { background: var(--error); }
  .dot.pending { background: var(--warn); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  @keyframes rec { 0%,100%{opacity:1}50%{opacity:.5} }

  .section {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .section-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

  select, .btn {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 5px;
    cursor: pointer;
    outline: none;
    margin-top: 4px;
  }

  select:hover, .btn:hover { border-color: var(--accent); }

  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { background: #79b8ff; }
  .btn.danger { background: rgba(248,81,73,0.15); border-color: var(--error); color: var(--error); font-weight: 600; }
  .btn.danger:hover { background: rgba(248,81,73,0.25); }
  .btn.recording { background: var(--error); color: white; border-color: var(--error); animation: rec 1.5s infinite; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .status-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .status-row .val { color: var(--text); }

  .capture-info {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  .capture-info .num { color: var(--accent); font-weight: 600; }

  .row { display: flex; gap: 6px; margin-top: 4px; }
  .row > * { flex: 1; }

  .viewer-link {
    display: block;
    text-align: center;
    padding: 10px;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
  }

  .viewer-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <span class="dot" id="agentDot"></span>
  <h1>IO Logs</h1>
</div>

<!-- Agent Connection -->
<div class="section">
  <div class="section-label">Agent</div>
  <div class="status-row">
    <span id="agentStatus">Connecting to ws://localhost:4040...</span>
  </div>
</div>

<!-- Auth -->
<div class="section">
  <div class="section-label">AWS Auth</div>
  <select id="profile">
    <option value="">Select profile...</option>
  </select>
  <div class="row">
    <button class="btn" id="checkBtn">Check</button>
    <button class="btn" id="loginBtn">SSO Login</button>
  </div>
  <div class="status-row">
    <span class="dot" id="authDot"></span>
    <span id="authInfo">Not checked</span>
  </div>
</div>

<!-- Namespace -->
<div class="section">
  <div class="section-label">Namespace</div>
  <div class="row">
    <select id="ns" disabled><option value="">Load namespaces first</option></select>
    <button class="btn" id="loadNs" disabled>Load</button>
  </div>
</div>

<!-- Capture -->
<div class="section">
  <button class="btn primary" id="startBtn" disabled>Start Capture</button>
  <button class="btn recording" id="stopBtn" style="display:none">Stop Capture</button>
  <div class="capture-info" id="captureInfo"></div>
</div>

<!-- Open Viewer -->
<a class="viewer-link" id="openViewer">Open Full Viewer</a>

<script src="popup.js"></script>
</body>
</html>
