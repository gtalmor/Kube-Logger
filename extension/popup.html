<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #6e7681;
    --accent: #58a6ff;
    --error: #f85149;
    --success: #3fb950;
    --warn: #d29922;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
  }

  .header {
    background: var(--bg2);
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header h1 { font-size: 13px; font-weight: 600; color: #f0f6fc; flex: 1; }

  .header-viewer-btn {
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg3);
    text-decoration: none;
  }
  .header-viewer-btn:hover { border-color: var(--accent); }

  .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  .dot.ok { background: var(--success); }
  .dot.fail { background: var(--error); }
  .dot.pending { background: var(--warn); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  @keyframes rec { 0%,100%{opacity:1}50%{opacity:.5} }

  .section {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .section-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .section-action { cursor: pointer; color: var(--muted); text-transform: none; letter-spacing: 0; font-size: 11px; padding: 0 4px; }
  .section-action:hover { color: var(--accent); }

  /* Profiles manage panel */
  .profiles-panel {
    margin-top: 6px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg3);
    max-height: 140px;
    overflow-y: auto;
  }
  .profile-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    font-size: 11px;
    border-bottom: 1px solid var(--border);
  }
  .profile-item:last-child { border-bottom: none; }
  .profile-item:hover { background: rgba(255,255,255,0.04); }
  .profile-item input[type=checkbox] { flex-shrink: 0; margin: 0; cursor: pointer; }
  .profile-item .pn { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .profile-hint { padding: 8px; text-align: center; color: var(--muted); font-size: 10px; }

  select, .btn {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 5px;
    cursor: pointer;
    outline: none;
    margin-top: 4px;
  }

  select:hover, .btn:hover { border-color: var(--accent); }

  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { background: #79b8ff; }
  .btn.danger { background: rgba(248,81,73,0.15); border-color: var(--error); color: var(--error); font-weight: 600; }
  .btn.danger:hover { background: rgba(248,81,73,0.25); }
  .btn.recording { background: var(--error); color: white; border-color: var(--error); animation: rec 1.5s infinite; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .status-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .status-row .val { color: var(--text); }

  .capture-info {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  .capture-info .num { color: var(--accent); font-weight: 600; }

  .row { display: flex; gap: 6px; margin-top: 4px; }
  .row > * { flex: 1; }

  /* Namespace multi-select list */
  .ns-list {
    margin-top: 6px;
    max-height: 150px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg3);
  }
  .ns-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .ns-item:last-child { border-bottom: none; }
  .ns-item:hover { background: rgba(255,255,255,0.04); }
  .ns-item input[type=checkbox] { flex-shrink: 0; cursor: pointer; margin: 0; }
  .ns-item .ns-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .ns-item input[type=color] { width: 22px; height: 18px; border: 1px solid var(--border); border-radius: 3px; padding: 0; background: transparent; cursor: pointer; flex-shrink: 0; }
  .ns-empty { padding: 16px 8px; text-align: center; color: var(--muted); font-size: 11px; }
  .ns-selected-summary { font-size: 10px; color: var(--muted); margin-top: 6px; min-height: 14px; }
  .ns-selected-summary .ns-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    margin-right: 4px;
    margin-top: 2px;
  }
  .ns-selected-summary .ns-chip .ns-dot {
    width: 8px; height: 8px; border-radius: 2px; display: inline-block;
  }

  .viewer-link {
    display: block;
    text-align: center;
    padding: 10px;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
  }

  .viewer-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <span class="dot" id="agentDot"></span>
  <h1>Kube Logger</h1>
  <a class="header-viewer-btn" id="openViewerHeader" title="Open full viewer">Viewer ↗</a>
</div>

<!-- Agent Connection -->
<div class="section">
  <div class="section-label">
    <span>Agent</span>
    <span class="section-action" id="saasManage" title="Configure the SaaS relay URL">Relay</span>
  </div>
  <div class="status-row">
    <span id="agentStatus">Connecting to ws://localhost:4040...</span>
  </div>
  <div id="saasRow" class="status-row" style="margin-top:4px">
    <span class="dot" id="saasDot"></span>
    <span id="saasInfo">No session</span>
  </div>
  <div id="saasConfig" style="display:none; margin-top:6px">
    <input type="text" id="saasUrl" placeholder="https://logviewer.gtalmor.com" style="width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:11px; padding:5px 8px; border-radius:4px; outline:none;" />
    <div style="font-size:10px; color:var(--muted); margin-top:4px">Web viewer served from this URL. Leave blank to disable the SaaS relay.</div>
  </div>
</div>

<!-- Auth -->
<div class="section">
  <div class="section-label">
    <span>AWS Auth</span>
    <span class="section-action" id="profilesManage" title="Manage which profiles appear in the dropdown">Manage</span>
  </div>
  <select id="profile">
    <option value="">Select profile...</option>
  </select>
  <div class="profiles-panel" id="profilesPanel" style="display:none">
    <div class="profiles-list" id="profilesList"></div>
  </div>
  <div class="row">
    <button class="btn" id="checkBtn">Check</button>
    <button class="btn" id="loginBtn">SSO Login</button>
  </div>
  <div class="status-row">
    <span class="dot" id="authDot"></span>
    <span id="authInfo">Not checked</span>
  </div>
</div>

<!-- Namespaces (multi-select) -->
<div class="section">
  <div class="section-label">Namespaces</div>
  <div class="row">
    <input type="text" id="nsFilter" placeholder="Filter..." style="flex:2; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:inherit; font-size:12px; padding:6px 8px; border-radius:5px; outline:none;" />
    <button class="btn" id="loadNs" disabled style="flex:1">Load</button>
  </div>
  <div class="ns-list" id="nsList">
    <div class="ns-empty">Load namespaces first</div>
  </div>
  <div class="ns-selected-summary" id="nsSelectedSummary"></div>
</div>

<!-- Capture -->
<div class="section">
  <button class="btn primary" id="startBtn" disabled>Start Capture</button>
  <button class="btn recording" id="stopBtn" style="display:none">Stop Capture</button>
  <div class="capture-info" id="captureInfo"></div>
  <button class="btn" id="clearBtn" style="display:none; margin-top:4px">Clear Capture</button>
</div>

<script src="popup.js"></script>
</body>
</html>
